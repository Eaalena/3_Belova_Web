<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearthstone - Коллекция Карт Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        header {
            background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid #e94560;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700; }
            to { text-shadow: 0 0 20px #ffed4e, 0 0 30px #ffed4e; }
        }
        .controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        button:hover::before { width: 300px; height: 300px; }
        .btn-edit { background: #e94560; color: white; }
        .btn-edit.active { background: #ffd700; color: #1a1a2e; }
        .btn-add { background: #0f3460; color: #ffd700; border: 2px solid #ffd700; display: none; }
        .btn-filter { background: #533483; color: white; }
        .btn-export { background: #00cc00; color: white; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .filter-panel {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: none;
            backdrop-filter: blur(10px);
        }
        .filter-panel.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .filter-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #ffd700; }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #533483;
            border-radius: 5px;
            background: #1a1a2e;
            color: #fff;
        }
        .stats-bar {
            background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            text-align: center;
        }
        .stat-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
        .stat-value { font-size: 2em; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 0.9em; color: #aaa; margin-top: 5px; }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .card {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            border: 3px solid;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        .card.minion { border-color: #8b4513; }
        .card.spell { border-color: #4169e1; }
        .card.weapon { border-color: #c0c0c0; }
        .card.common { box-shadow: 0 0 20px rgba(136,136,136,0.3); }
        .card.rare { box-shadow: 0 0 20px rgba(0,112,221,0.5); }
        .card.epic { box-shadow: 0 0 20px rgba(163,53,238,0.5); }
        .card.legendary {
            box-shadow: 0 0 30px rgba(255,128,0,0.7);
            animation: legendaryPulse 2s ease-in-out infinite;
        }
        @keyframes legendaryPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255,128,0,0.7); }
            50% { box-shadow: 0 0 50px rgba(255,128,0,1); }
        }
        .card-header {
            font-weight: bold;
            font-size: 1.3em;
            text-align: center;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
        }
        .minion .card-header { background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%); }
        .spell .card-header { background: linear-gradient(135deg, #4169e1 0%, #1e90ff 100%); }
        .weapon .card-header { background: linear-gradient(135deg, #696969 0%, #a9a9a9 100%); }
        .card-mana {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00bfff 0%, #0080ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid #fff;
            z-index: 10;
        }
        .card-rarity {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .rarity-common { background: linear-gradient(135deg, #888 0%, #aaa 100%); color: white; }
        .rarity-rare { background: linear-gradient(135deg, #0070dd 0%, #00bfff 100%); color: white; }
        .rarity-epic { background: linear-gradient(135deg, #a335ee 0%, #d480ff 100%); color: white; }
        .rarity-legendary {
            background: linear-gradient(135deg, #ff8000 0%, #ffcc00 100%);
            color: black;
            animation: rarityGlow 2s ease-in-out infinite;
        }
        @keyframes rarityGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .card-type {
            color: #ffd700;
            text-align: center;
            margin: 15px 0;
            font-style: italic;
            font-size: 1.1em;
            padding: 8px;
            background: rgba(255,215,0,0.1);
            border-radius: 5px;
        }
        .card-stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .stat {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.3);
        }
        .stat.attack {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            color: white;
            animation: attackPulse 1.5s ease-in-out infinite;
        }
        @keyframes attackPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .stat.health { background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%); color: black; }
        .stat.durability { background: linear-gradient(135deg, #c0c0c0 0%, #808080 100%); color: black; }
        .card-description {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            text-align: center;
            margin-top: 15px;
            font-size: 0.95em;
            line-height: 1.5;
            border-left: 4px solid #ffd700;
        }
        .card-class-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #e94560;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-delete {
            position: absolute;
            top: 15px;
            right: 80px;
            background: #ff0000;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            z-index: 50;
            font-size: 0.9em;
        }
        .btn-delete:hover { background: #cc0000; transform: scale(1.1); }
        .edit-mode .btn-delete { display: block; }
        .edit-panel {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            padding: 25px;
            z-index: 100;
            border-radius: 15px;
            overflow-y: auto;
        }
        .edit-panel.active { display: flex; animation: fadeIn 0.3s ease; }
        .edit-panel h3 { color: #ffd700; margin-bottom: 20px; text-align: center; font-size: 1.5em; }
        .edit-panel label { margin: 8px 0 5px; color: #fff; font-weight: bold; }
        .edit-panel input, .edit-panel select, .edit-panel textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 2px solid #533483;
            background: #2d2d44;
            color: #fff;
            font-size: 1em;
        }
        .edit-panel input:focus, .edit-panel select:focus, .edit-panel textarea:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .edit-buttons { display: flex; gap: 15px; margin-top: auto; padding-top: 20px; }
        .edit-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-save { background: linear-gradient(135deg, #00cc00 0%, #00ff00 100%); color: white; }
        .btn-cancel { background: linear-gradient(135deg, #666 0%, #888 100%); color: white; }
        .add-card-form {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            padding: 35px;
            border-radius: 15px;
            max-width: 700px;
            margin: 0 auto 30px;
            display: none;
            border: 3px solid #e94560;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideDown 0.3s ease;
        }
        .add-card-form.active { display: block; }
        .add-card-form h2 { color: #ffd700; margin-bottom: 25px; text-align: center; font-size: 2em; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #ffd700; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #533483;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        .form-actions { display: flex; gap: 15px; margin-top: 25px; }
        .form-actions button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00cc00 0%, #00ff00 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            display: none;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-weight: bold;
        }
        .toast.error { background: linear-gradient(135deg, #ff0000 0%, #ff4444 100%); }
        .toast.show { display: block; }
        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #e94560;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        .modal h3 { color: #ffd700; margin-bottom: 15px; font-size: 1.5em; }
        .modal p { margin-bottom: 25px; color: #ccc; }
        .modal-buttons { display: flex; gap: 15px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; }
            .controls { justify-content: center; }
            .cards-container { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            h1 { font-size: 1.8em; }
        }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; grid-column: 1 / -1; }
        .empty-state-icon { font-size: 5em; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h2 { color: #ffd700; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>⚔️ Hearthstone Коллекция Pro</h1>
        <div class="controls">
            <button class="btn-filter" onclick="toggleFilters()">🔍 Фильтры</button>
            <button id="editModeToggle" class="btn-edit" onclick="toggleEditMode()">✏️ Режим редактирования</button>
            <button id="addCardBtn" class="btn-add" onclick="toggleAddForm()">➕ Добавить карту</button>
            <button class="btn-export" onclick="exportDeck()">📥 Экспорт</button>
        </div>
    </header>

    <div id="filterPanel" class="filter-panel">
        <div class="filter-group">
            <div>
                <label>🔍 Поиск:</label>
                <input type="text" id="filterSearch" placeholder="Название карты..." oninput="applyFilters()">
            </div>
            <div>
                <label>📊 Тип карты:</label>
                <select id="filterType" onchange="applyFilters()">
                    <option value="">Все типы</option>
                    <option value="minion">Миньоны</option>
                    <option value="spell">Заклинания</option>
                    <option value="weapon">Оружие</option>
                </select>
            </div>
            <div>
                <label>🎓 Класс:</label>
                <select id="filterClass" onchange="applyFilters()">
                    <option value="">Все классы</option>
                    <option value="neutral">Neutral</option>
                    <option value="mage">Mage</option>
                    <option value="warrior">Warrior</option>
                    <option value="priest">Priest</option>
                    <option value="hunter">Hunter</option>
                    <option value="warlock">Warlock</option>
                </select>
            </div>
            <div>
                <label>💎 Редкость:</label>
                <select id="filterRarity" onchange="applyFilters()">
                    <option value="">Все редкости</option>
                    <option value="common">Common</option>
                    <option value="rare">Rare</option>
                    <option value="epic">Epic</option>
                    <option value="legendary">Legendary</option>
                </select>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="totalCards">0</div>
            <div class="stat-label">Всего карт</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="totalMinions">0</div>
            <div class="stat-label">Миньонов</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="totalSpells">0</div>
            <div class="stat-label">Заклинаний</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="totalWeapons">0</div>
            <div class="stat-label">Оружий</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="avgMana">0</div>
            <div class="stat-label">Средняя мана</div>
        </div>
    </div>

    <div id="addCardForm" class="add-card-form">
        <h2>✨ Создание новой карты</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Тип карты:</label>
                <select id="newCardType" onchange="updateFormFields()">
                    <option value="minion">Миньон</option>
                    <option value="spell">Заклинание</option>
                    <option value="weapon">Оружие</option>
                </select>
            </div>
            <div class="form-group">
                <label>Название: *</label>
                <input type="text" id="newCardName" placeholder="Введите название">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Стоимость маны: *</label>
                <input type="number" id="newCardCost" min="0" max="20" placeholder="0-20">
            </div>
            <div class="form-group">
                <label>Редкость:</label>
                <select id="newCardRarity">
                    <option value="common">Common</option>
                    <option value="rare">Rare</option>
                    <option value="epic">Epic</option>
                    <option value="legendary">Legendary</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Класс:</label>
                <select id="newCardClass">
                    <option value="neutral">Neutral</option>
                    <option value="mage">Mage</option>
                    <option value="warrior">Warrior</option>
                    <option value="priest">Priest</option>
                    <option value="hunter">Hunter</option>
                    <option value="warlock">Warlock</option>
                </select>
            </div>
            <div class="form-group" id="attackGroup">
                <label>Атака:</label>
                <input type="number" id="newCardAttack" min="0" max="20" placeholder="0-20">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group" id="healthGroup">
                <label>Здоровье:</label>
                <input type="number" id="newCardHealth" min="1" max="30" placeholder="1-30">
            </div>
            <div class="form-group" id="durabilityGroup" style="display:none;">
                <label>Прочность:</label>
                <input type="number" id="newCardDurability" min="1" max="10" placeholder="1-10">
            </div>
        </div>
        <div class="form-group">
            <label>Описание способности:</label>
            <textarea id="newCardDescription" rows="3" placeholder="Опишите эффект карты..."></textarea>
        </div>
        <div class="form-actions">
            <button class="btn-save" onclick="createNewCard()">✨ Создать карту</button>
            <button class="btn-cancel" onclick="toggleAddForm()">❌ Отмена</button>
        </div>
    </div>

    <div id="cardsContainer" class="cards-container"></div>
    <div id="toast" class="toast"></div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle">Подтверждение</h3>
            <p id="modalText">Вы уверены?</p>
            <div class="modal-buttons">
                <button class="btn-save" id="modalConfirm">Подтвердить</button>
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        var cards = [];
        var editMode = false;
        var deleteCallback = null;

        function Card(name, cost, rarity, cardClass, description) {
            this.id = Date.now().toString() + Math.random().toString(36).substr(2, 9);
            this.name = name;
            this.cost = cost;
            this.rarity = rarity;
            this.cardClass = cardClass;
            this.description = description;
        }

        Card.prototype.getType = function() { return 'card'; };
        Card.prototype.getTypeName = function() { return 'Карта'; };
        Card.prototype.getRarityName = function() {
            var names = { 'common': 'Common', 'rare': 'Rare', 'epic': 'Epic', 'legendary': 'Legendary' };
            return names[this.rarity] || 'Common';
        };
        Card.prototype.getCardClassName = function() {
            var names = { 'neutral': 'Neutral', 'mage': 'Mage', 'warrior': 'Warrior', 'priest': 'Priest', 'hunter': 'Hunter', 'warlock': 'Warlock' };
            return names[this.cardClass] || 'Neutral';
        };
        Card.prototype.getStatsHTML = function() { return ''; };
        Card.prototype.getEditFields = function() { return ''; };

        Card.prototype.getDataFromEditPanel = function(id) {
            var panel = document.getElementById('edit-' + id);
            return {
                name: panel.querySelector('.edit-name').value,
                cost: parseInt(panel.querySelector('.edit-cost').value) || 0,
                rarity: panel.querySelector('.edit-rarity').value,
                cardClass: panel.querySelector('.edit-class').value,
                description: panel.querySelector('.edit-description').value
            };
        };

        Card.prototype.getEditPanel = function() {
            var html = '<div class="edit-panel" id="edit-' + this.id + '">';
            html += '<h3>✏️ Редактирование карты</h3>';
            html += '<label>Название:</label><input type="text" class="edit-name" value="' + this.name + '">';
            html += '<label>Мана:</label><input type="number" class="edit-cost" value="' + this.cost + '">';
            html += '<label>Редкость:</label><select class="edit-rarity">';
            html += '<option value="common"' + (this.rarity === 'common' ? ' selected' : '') + '>Common</option>';
            html += '<option value="rare"' + (this.rarity === 'rare' ? ' selected' : '') + '>Rare</option>';
            html += '<option value="epic"' + (this.rarity === 'epic' ? ' selected' : '') + '>Epic</option>';
            html += '<option value="legendary"' + (this.rarity === 'legendary' ? ' selected' : '') + '>Legendary</option>';
            html += '</select>';
            html += '<label>Класс:</label><select class="edit-class">';
            html += '<option value="neutral"' + (this.cardClass === 'neutral' ? ' selected' : '') + '>Neutral</option>';
            html += '<option value="mage"' + (this.cardClass === 'mage' ? ' selected' : '') + '>Mage</option>';
            html += '<option value="warrior"' + (this.cardClass === 'warrior' ? ' selected' : '') + '>Warrior</option>';
            html += '<option value="priest"' + (this.cardClass === 'priest' ? ' selected' : '') + '>Priest</option>';
            html += '<option value="hunter"' + (this.cardClass === 'hunter' ? ' selected' : '') + '>Hunter</option>';
            html += '<option value="warlock"' + (this.cardClass === 'warlock' ? ' selected' : '') + '>Warlock</option>';
            html += '</select>';
            html += '<label>Описание:</label><textarea class="edit-description" rows="3">' + this.description + '</textarea>';
            html += this.getEditFields();
            html += '<div class="edit-buttons">';
            html += '<button class="btn-save" onclick="saveCard(\'' + this.id + '\')">💾 Сохранить</button>';
            html += '<button class="btn-cancel" onclick="cancelEdit(\'' + this.id + '\')">❌ Отмена</button>';
            html += '</div></div>';
            return html;
        };

        Card.prototype.getHTML = function() {
            var html = '<div class="card ' + this.getType() + ' ' + this.rarity + '">';
            html += '<div class="card-mana">' + this.cost + '</div>';
            html += '<div class="card-rarity rarity-' + this.rarity + '">' + this.getRarityName() + '</div>';
            html += '<button class="btn-delete" onclick="confirmDelete(\'' + this.id + '\')">🗑️</button>';
            html += '<div class="card-header">' + this.name + '</div>';
            html += '<div class="card-type">' + this.getTypeName() + ' | ' + this.getCardClassName() + '</div>';
            html += '<div class="card-description">' + this.description + '</div>';
            html += this.getStatsHTML();
            html += '<div style="text-align:center;"><span class="card-class-badge">' + this.getCardClassName() + '</span></div>';
            html += this.getEditPanel();
            html += '</div>';
            return html;
        };

        Card.prototype.toJSON = function() {
            return {
                id: this.id,
                type: this.getType(),
                name: this.name,
                cost: this.cost,
                rarity: this.rarity,
                cardClass: this.cardClass,
                description: this.description
            };
        };

        function Minion(name, cost, rarity, cardClass, description, attack, health) {
            Card.call(this, name, cost, rarity, cardClass, description);
            this.attack = attack;
            this.health = health;
        }

        Minion.prototype = Object.create(Card.prototype);
        Minion.prototype.constructor = Minion;
        Minion.prototype.getType = function() { return 'minion'; };
        Minion.prototype.getTypeName = function() { return 'Миньон'; };

        Minion.prototype.getStatsHTML = function() {
            return '<div class="card-stats">' +
                '<div class="stat attack">⚔️' + this.attack + '</div>' +
                '<div class="stat health">❤️' + this.health + '</div></div>';
        };

        Minion.prototype.getEditFields = function() {
            return '<label>Атака:</label><input type="number" class="edit-attack" value="' + this.attack + '">' +
                '<label>Здоровье:</label><input type="number" class="edit-health" value="' + this.health + '">';
        };

        Minion.prototype.getDataFromEditPanel = function(id) {
            var data = Card.prototype.getDataFromEditPanel.call(this, id);
            var panel = document.getElementById('edit-' + id);
            data.attack = parseInt(panel.querySelector('.edit-attack').value) || 1;
            data.health = parseInt(panel.querySelector('.edit-health').value) || 1;
            return data;
        };

        Minion.prototype.toJSON = function() {
            var data = Card.prototype.toJSON.call(this);
            data.attack = this.attack;
            data.health = this.health;
            return data;
        };

        function Spell(name, cost, rarity, cardClass, description, spellType) {
            Card.call(this, name, cost, rarity, cardClass, description);
            this.spellType = spellType;
        }

        Spell.prototype = Object.create(Card.prototype);
        Spell.prototype.constructor = Spell;
        Spell.prototype.getType = function() { return 'spell'; };
        Spell.prototype.getTypeName = function() { return 'Заклинание'; };

        Spell.prototype.getEditFields = function() {
            return '<label>Тип:</label><select class="edit-spell-type">' +
                '<option value="instant"' + (this.spellType === 'instant' ? ' selected' : '') + '>Мгновенное</option>' +
                '<option value="sorcery"' + (this.spellType === 'sorcery' ? ' selected' : '') + '>Волшебство</option></select>';
        };

        Spell.prototype.getDataFromEditPanel = function(id) {
            var data = Card.prototype.getDataFromEditPanel.call(this, id);
            var panel = document.getElementById('edit-' + id);
            data.spellType = panel.querySelector('.edit-spell-type').value;
            return data;
        };

        Spell.prototype.toJSON = function() {
            var data = Card.prototype.toJSON.call(this);
            data.spellType = this.spellType;
            return data;
        };

        function Weapon(name, cost, rarity, cardClass, description, attack, durability) {
            Card.call(this, name, cost, rarity, cardClass, description);
            this.attack = attack;
            this.durability = durability;
        }

        Weapon.prototype = Object.create(Card.prototype);
        Weapon.prototype.constructor = Weapon;
        Weapon.prototype.getType = function() { return 'weapon'; };
        Weapon.prototype.getTypeName = function() { return 'Оружие'; };

        Weapon.prototype.getStatsHTML = function() {
            return '<div class="card-stats">' +
                '<div class="stat attack">⚔️' + this.attack + '</div>' +
                '<div class="stat durability">🛡️' + this.durability + '</div></div>';
        };

        Weapon.prototype.getEditFields = function() {
            return '<label>Атака:</label><input type="number" class="edit-attack" value="' + this.attack + '">' +
                '<label>Прочность:</label><input type="number" class="edit-durability" value="' + this.durability + '">';
        };

        Weapon.prototype.getDataFromEditPanel = function(id) {
            var data = Card.prototype.getDataFromEditPanel.call(this, id);
            var panel = document.getElementById('edit-' + id);
            data.attack = parseInt(panel.querySelector('.edit-attack').value) || 1;
            data.durability = parseInt(panel.querySelector('.edit-durability').value) || 1;
            return data;
        };

        Weapon.prototype.toJSON = function() {
            var data = Card.prototype.toJSON.call(this);
            data.attack = this.attack;
            data.durability = this.durability;
            return data;
        };

        function buildWebsite() {
            var container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="empty-state">' +
                    '<div class="empty-state-icon">🎴</div>' +
                    '<h2>Коллекция пуста</h2>' +
                    '<p>Добавьте свою первую карту!</p></div>';
            } else {
                var filteredCards = getFilteredCards();
                for (var i = 0; i < filteredCards.length; i++) {
                    var tempDiv = document.createElement('div');
                    tempDiv.innerHTML = filteredCards[i].getHTML();
                    container.appendChild(tempDiv.firstElementChild);
                }
            }
            
            var panels = document.querySelectorAll('.edit-panel');
            if (editMode) {
                document.body.classList.add('edit-mode');
                for (var j = 0; j < panels.length; j++) {
                    panels[j].classList.add('active');
                }
            } else {
                document.body.classList.remove('edit-mode');
                for (var j = 0; j < panels.length; j++) {
                    panels[j].classList.remove('active');
                }
            }
            
            updateStats();
        }

        function getFilteredCards() {
            var search = document.getElementById('filterSearch').value.toLowerCase();
            var type = document.getElementById('filterType').value;
            var cardClass = document.getElementById('filterClass').value;
            var rarity = document.getElementById('filterRarity').value;
            
            var result = [];
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var match = true;
                
                if (search && card.name.toLowerCase().indexOf(search) === -1) match = false;
                if (type && card.getType() !== type) match = false;
                if (cardClass && card.cardClass !== cardClass) match = false;
                if (rarity && card.rarity !== rarity) match = false;
                
                if (match) result.push(card);
            }
            return result;
        }

        function applyFilters() {
            buildWebsite();
        }

        function updateStats() {
            document.getElementById('totalCards').textContent = cards.length;
            
            var minions = 0, spells = 0, weapons = 0, totalMana = 0;
            for (var i = 0; i < cards.length; i++) {
                if (cards[i].getType() === 'minion') minions++;
                else if (cards[i].getType() === 'spell') spells++;
                else if (cards[i].getType() === 'weapon') weapons++;
                totalMana += cards[i].cost;
            }
            
            document.getElementById('totalMinions').textContent = minions;
            document.getElementById('totalSpells').textContent = spells;
            document.getElementById('totalWeapons').textContent = weapons;
            document.getElementById('avgMana').textContent = cards.length > 0 ? (totalMana / cards.length).toFixed(1) : '0';
        }

        function initializeCards() {
            var savedCards = localStorage.getItem('hearthstoneCards');
            
            if (savedCards) {
                var cardsData = JSON.parse(savedCards);
                cards = [];
                for (var i = 0; i < cardsData.length; i++) {
                    var cd = cardsData[i];
                    if (cd.type === 'minion') {
                        cards.push(new Minion(cd.name, cd.cost, cd.rarity, cd.cardClass, cd.description, cd.attack, cd.health));
                    } else if (cd.type === 'spell') {
                        cards.push(new Spell(cd.name, cd.cost, cd.rarity, cd.cardClass, cd.description, cd.spellType));
                    } else if (cd.type === 'weapon') {
                        cards.push(new Weapon(cd.name, cd.cost, cd.rarity, cd.cardClass, cd.description, cd.attack, cd.durability));
                    }
                }
            } else {
                cards = [
                    new Minion('Огненный Ящер', 3, 'common', 'neutral', 'Рывок. Когда этот миньон атакует, нанесите 1 урон всем врагам.', 3, 4),
                    new Minion('Ледяной Маг', 4, 'rare', 'mage', 'Боевой клич: Заморозьте цель.', 2, 5),
                    new Minion('Древний Защитник', 7, 'epic', 'priest', 'Провокация. В начале вашего хода восстановите 2 здоровья.', 5, 8),
                    new Spell('Огненный Шар', 4, 'common', 'mage', 'Нанесите 6 урона цели.', 'sorcery'),
                    new Spell('Исцеление', 2, 'common', 'priest', 'Восстановите 5 здоровья вашему герою.', 'instant'),
                    new Weapon('Клинок Тьмы', 3, 'rare', 'warrior', '', 3, 2),
                    new Minion('Легендарный Дракон', 9, 'legendary', 'neutral', 'Боевой клич: Нанесите 5 урона всем врагам. Рывок.', 8, 8)
                ];
                saveToLocalStorage();
            }
        }

        function saveToLocalStorage() {
            var cardsData = [];
            for (var i = 0; i < cards.length; i++) {
                cardsData.push(cards[i].toJSON());
            }
            localStorage.setItem('hearthstoneCards', JSON.stringify(cardsData));
        }

        function toggleEditMode() {
            editMode = !editMode;
            var btn = document.getElementById('editModeToggle');
            var addBtn = document.getElementById('addCardBtn');
            
            if (editMode) {
                btn.classList.add('active');
                btn.textContent = '✓ Редактирование ВКЛ';
                addBtn.style.display = 'block';
                showToast('Режим редактирования включен');
            } else {
                btn.classList.remove('active');
                btn.textContent = '✏️ Режим редактирования';
                addBtn.style.display = 'none';
            }
            buildWebsite();
        }

        function saveCard(id) {
            for (var i = 0; i < cards.length; i++) {
                if (cards[i].id === id) {
                    var newData = cards[i].getDataFromEditPanel(id);
                    for (var key in newData) {
                        cards[i][key] = newData[key];
                    }
                    saveToLocalStorage();
                    buildWebsite();
                    showToast('Карта сохранена! ✅');
                    break;
                }
            }
        }

        function cancelEdit(id) {
            var panel = document.getElementById('edit-' + id);
            if (panel) {
                panel.classList.remove('active');
            }
        }

        function confirmDelete(id) {
            deleteCallback = id;
            showModal('Удаление карты', 'Вы уверены, что хотите удалить эту карту?', function() {
                deleteCard(id);
            });
        }

        function deleteCard(id) {
            var newCards = [];
            for (var i = 0; i < cards.length; i++) {
                if (cards[i].id !== id) {
                    newCards.push(cards[i]);
                }
            }
            cards = newCards;
            saveToLocalStorage();
            buildWebsite();
            showToast('Карта удалена 🗑️');
            closeModal();
        }

        function toggleAddForm() {
            var form = document.getElementById('addCardForm');
            if (form.classList.contains('active')) {
                form.classList.remove('active');
            } else {
                form.classList.add('active');
                updateFormFields();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function updateFormFields() {
            var type = document.getElementById('newCardType').value;
            var attackGroup = document.getElementById('attackGroup');
            var healthGroup = document.getElementById('healthGroup');
            var durabilityGroup = document.getElementById('durabilityGroup');
            
            if (type === 'minion') {
                attackGroup.style.display = 'block';
                healthGroup.style.display = 'block';
                durabilityGroup.style.display = 'none';
            } else if (type === 'weapon') {
                attackGroup.style.display = 'block';
                healthGroup.style.display = 'none';
                durabilityGroup.style.display = 'block';
            } else {
                attackGroup.style.display = 'none';
                healthGroup.style.display = 'none';
                durabilityGroup.style.display = 'none';
            }
        }

        function createNewCard() {
            var type = document.getElementById('newCardType').value;
            var name = document.getElementById('newCardName').value.trim();
            var cost = parseInt(document.getElementById('newCardCost').value);
            
            if (!name) {
                showToast('Введите название карты! ❌', true);
                return;
            }
            if (isNaN(cost)) {
                showToast('Введите стоимость маны! ❌', true);
                return;
            }
            
            var rarity = document.getElementById('newCardRarity').value;
            var cardClass = document.getElementById('newCardClass').value;
            var description = document.getElementById('newCardDescription').value.trim();
            var newCard = null;
            
            if (type === 'minion') {
                var attack = parseInt(document.getElementById('newCardAttack').value) || 1;
                var health = parseInt(document.getElementById('newCardHealth').value) || 1;
                newCard = new Minion(name, cost, rarity, cardClass, description, attack, health);
            } else if (type === 'spell') {
                newCard = new Spell(name, cost, rarity, cardClass, description, 'sorcery');
            } else if (type === 'weapon') {
                var weaponAttack = parseInt(document.getElementById('newCardAttack').value) || 1;
                var durability = parseInt(document.getElementById('newCardDurability').value) || 1;
                newCard = new Weapon(name, cost, rarity, cardClass, description, weaponAttack, durability);
            }
            
            if (newCard) {
                cards.push(newCard);
                saveToLocalStorage();
                buildWebsite();
                toggleAddForm();
                showToast('Карта создана! ✨');
                
                document.getElementById('newCardName').value = '';
                document.getElementById('newCardCost').value = '';
                document.getElementById('newCardDescription').value = '';
                document.getElementById('newCardAttack').value = '';
                document.getElementById('newCardHealth').value = '';
                document.getElementById('newCardDurability').value = '';
            }
        }

        function toggleFilters() {
            var panel = document.getElementById('filterPanel');
            panel.classList.toggle('active');
        }

        function exportDeck() {
            var data = {
                cards: cards.map(function(c) { return c.toJSON(); }),
                exportedAt: new Date().toISOString()
            };
            var dataStr = JSON.stringify(data, null, 2);
            var dataBlob = new Blob([dataStr], {type: 'application/json'});
            var url = URL.createObjectURL(dataBlob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'hearthstone-deck-' + Date.now() + '.json';
            link.click();
            URL.revokeObjectURL(url);
            showToast('Колода экспортирована! 📥');
        }

        function showToast(message, isError) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(function() {
                toast.className = 'toast';
            }, 3000);
        }

        function showModal(title, text, onConfirm) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalConfirm').onclick = function() {
                if (onConfirm) onConfirm();
                closeModal();
            };
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        window.onload = function() {
            initializeCards();
            buildWebsite();
            showToast('Добро пожаловать! 🎮');
        };

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
